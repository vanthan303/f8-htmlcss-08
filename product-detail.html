<!doctype html>
<html lang="en" class="">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Grocery Mart</title>

        <!-- Favicon -->
        <link rel="icon" type="image/png" href="./assets/favicon/favicon-96x96.png" sizes="96x96" />
        <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
        <link rel="shortcut icon" href="./assets/favicon/favicon.ico" />
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
        <link rel="manifest" href="./assets/favicon/site.webmanifest" />

        <!-- Fonts -->
        <link rel="stylesheet" href="./assets/fonts/stylesheet.css" />

        <!-- Styles -->
        <link rel="stylesheet" href="./assets/css/main.css" />

        <!-- Scripts -->
        <script src="./assets/js/scripts.js"></script>
    </head>
    <body>
        <!-- Header -->
        <header id="header" class="header"></header>
        <script>
            // Gọi hàm load trong JS để đổ cấu trúc HTML từ "header.html" vào trong thẻ header có id="header"
            load("#header", "./templates/header-logined.html");
        </script>

        <!-- Main -->
        <main class="product-page">
            <div class="container">
                <!-- Breadcrumbs -->
                <div class="product-container">
                    <!-- Breadcrumbs-->
                    <ul class="breadcrumbs">
                        <li>
                            <a href="#!" class="breadcrumbs__link">
                                Departments
                                <img src="./assets/icons/arrow-right.svg" alt="" />
                            </a>
                        </li>
                        <li>
                            <a href="#!" class="breadcrumbs__link">
                                Coffee
                                <img src="./assets/icons/arrow-right.svg" alt="" />
                            </a>
                        </li>
                        <li>
                            <a href="#!" class="breadcrumbs__link">
                                Coffee Beans
                                <img src="./assets/icons/arrow-right.svg" alt="" />
                            </a>
                        </li>
                        <li>
                            <a href="#!" class="breadcrumbs__link breadcrumbs__link--current">LavAzza</a>
                        </li>
                    </ul>
                </div>

                <!-- Product Info -->
                <div class="product-container">
                    <div class="row">
                        <div class="col-5">
                            <div class="prod-review">
                                <div class="prod-review__list">
                                    <div class="prod-review__item">
                                        <img src="./assets/img/product/item-1.png" alt="" class="prod-review__img" />
                                    </div>
                                    <div class="prod-review__item">
                                        <img src="./assets/img/product/item-2.png" alt="" class="prod-review__img" />
                                    </div>

                                    <div class="prod-review__item">
                                        <img src="./assets/img/product/item-3.png" alt="" class="prod-review__img" />
                                    </div>

                                    <div class="prod-review__item">
                                        <img src="./assets/img/product/item-4.png" alt="" class="prod-review__img" />
                                    </div>
                                </div>
                                <div class="prod-review__thumbs">
                                    <img
                                        src="./assets/img/product/item-1.png"
                                        alt=""
                                        class="prod-review__thumb-img prod-review__thumb-img--current"
                                    />
                                    <img src="./assets/img/product/item-2.png" alt="" class="prod-review__thumb-img" />
                                    <img src="./assets/img/product/item-3.png" alt="" class="prod-review__thumb-img" />
                                    <img src="./assets/img/product/item-4.png" alt="" class="prod-review__thumb-img" />
                                </div>
                            </div>
                        </div>
                        <div class="col-7">
                            Lorem ipsum dolor sit amet consectetur adipisicing elit. Sequi, dicta. Eaque, expedita?
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer id="footer" class="footer"></footer>
        <script>
            // Gọi hàm load trong JS để đổ cấu trúc HTML từ "footer.html" vào trong thẻ footer có id="footer"
            load("#footer", "./templates/footer.html");
        </script>
    </body>
</html>
